<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cereal 3d scatter</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --s: #e63946; --a: #f4a261; --b: #2a9d8f; --c: #457b9d; --d: #6d6875;
    --bg: #fdf6ec; --ink: #1a1209; --paper: #fffdf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,160,120,0.12) 39px, rgba(180,160,120,0.12) 40px);
  }
  .container {
    width: 100%;
    max-width: 900px;
    background: var(--paper);
    border: 2.5px solid var(--ink);
    box-shadow: 7px 7px 0 var(--ink);
    overflow: hidden;
  }
  .header {
    background: var(--ink);
    padding: 14px 20px 12px;
    display: flex; align-items: baseline; gap: 14px;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: repeating-linear-gradient(90deg, var(--s) 0 40px, var(--a) 40px 80px, var(--b) 80px 120px, var(--c) 120px 160px, var(--d) 160px 200px);
  }
  .title { font-family: 'Alfa Slab One', serif; font-size: 22px; color: var(--bg); text-transform: uppercase; letter-spacing: 0.04em; }
  .subtitle { font-size: 9px; color: rgba(253,246,236,0.45); letter-spacing: 0.14em; text-transform: uppercase; }
  #canvas-wrap { position: relative; width: 100%; height: 440px; background: var(--paper); cursor: grab; }
  #canvas-wrap:active { cursor: grabbing; }
  canvas { display: block; }
  #tooltip {
    position: absolute; pointer-events: none;
    background: var(--ink); color: var(--bg);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 5px 10px; white-space: nowrap;
    opacity: 0; transition: opacity 0.1s;
    border: 1.5px solid var(--bg);
  }
  .footer-bar {
    padding: 8px 16px;
    display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
    border-top: 2px solid var(--ink);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(26,18,9,0.6); cursor: pointer; user-select: none; padding: 3px 6px; border: 1.5px solid transparent; transition: all 0.15s; }
  .legend-item:hover { border-color: rgba(26,18,9,0.2); }
  .legend-item.active { border-color: var(--ink); background: rgba(26,18,9,0.05); }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .reset-btn { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 8px; border: 1.5px solid rgba(26,18,9,0.3); background: transparent; color: rgba(26,18,9,0.5); cursor: pointer; }
  .reset-btn:hover { border-color: var(--ink); color: var(--ink); }
  .axis-legend { font-size: 9px; letter-spacing: 0.08em; color: rgba(26,18,9,0.4); text-transform: uppercase; }
  .search-bar {
    padding: 10px 16px;
    border-top: 2px solid var(--ink);
    display: flex; gap: 10px; align-items: center;
  }
  .search-bar input {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 10px;
    border: 1.5px solid var(--ink);
    background: white;
    color: var(--ink);
    flex: 1;
    outline: none;
  }
  .search-bar input::placeholder { color: rgba(26,18,9,0.3); }
  .search-bar input:focus { border-color: var(--b); }
  #search-result {
    padding: 0 16px 12px;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    min-height: 0;
    transition: all 0.15s;
  }
  .result-card {
    border: 1.5px solid var(--ink);
    background: white;
    padding: 10px 14px;
    display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
  }
  .result-name { font-family: 'Alfa Slab One', serif; font-size: 14px; color: var(--ink); letter-spacing: 0.04em; }
  .result-tier {
    font-family: 'Alfa Slab One', serif; font-size: 11px; color: white;
    padding: 2px 7px;
  }
  .result-axes { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; width: 100%; }
  .result-axis { display: flex; flex-direction: column; gap: 2px; }
  .result-axis-label { font-size: 8px; color: rgba(26,18,9,0.4); letter-spacing: 0.1em; }
  .result-axis-val { font-size: 13px; font-weight: 500; }
  .result-axis-dots { display: flex; gap: 2px; margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(26,18,9,0.1); }
  .dot.filled { background: var(--ink); }
  .result-weighted { margin-left: auto; text-align: right; }
  .result-weighted-label { font-size: 8px; color: rgba(26,18,9,0.4); letter-spacing: 0.1em; }
  .result-weighted-val { font-size: 20px; font-family: 'Alfa Slab One', serif; }
  .no-result { color: rgba(26,18,9,0.35); font-size: 10px; padding: 8px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">Cereal Space</div>
    <div class="subtitle">x: structural integrity · y: milk palatability · z: dry merit · size: cartoon effect · drag to rotate</div>
  </div>
  <div id="canvas-wrap">
    <div id="tooltip"></div>
  </div>
  <div class="footer-bar">
    <div class="legend-item" data-tier="s"><div class="legend-dot" style="background:var(--s)"></div>S tier</div>
    <div class="legend-item" data-tier="a"><div class="legend-dot" style="background:var(--a)"></div>A tier</div>
    <div class="legend-item" data-tier="b"><div class="legend-dot" style="background:var(--b)"></div>B tier</div>
    <div class="legend-item" data-tier="c"><div class="legend-dot" style="background:var(--c)"></div>C tier</div>
    <div class="legend-item" data-tier="d"><div class="legend-dot" style="background:var(--d)"></div>D tier</div>
    <div class="axis-legend">sphere size = cartoon effect</div>
    <button class="reset-btn" id="reset-filter">show all</button>
  </div>
  <div class="search-bar">
    <input type="text" id="cereal-search" placeholder="search a cereal..." autocomplete="off" />
  </div>
  <div id="search-result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TIER_COLORS = { s: 0xe63946, a: 0xf4a261, b: 0x2a9d8f, c: 0x457b9d, d: 0x6d6875 };

const data = [
  { name: "PB Puffins",            struct:4, milk:4, dry:5, cartoon:3, tier:"s", weighted:4.05 },
  { name: "Rice Krispies",         struct:2, milk:3, dry:2, cartoon:3, tier:"s", weighted:2.45 },
  { name: "Honey Nut Cheerios",    struct:4, milk:4, dry:5, cartoon:2, tier:"s", weighted:3.90 },
  { name: "Panda Puffs",           struct:4, milk:4, dry:3, cartoon:2, tier:"s", weighted:3.50 },
  { name: "Honeycombs",            struct:3, milk:5, dry:5, cartoon:2, tier:"a", weighted:3.85 },
  { name: "Frosted Flakes",        struct:5, milk:4, dry:4, cartoon:3, tier:"a", weighted:4.20 },
  { name: "Kix",                   struct:3, milk:3, dry:5, cartoon:1, tier:"a", weighted:3.10 },
  { name: "Apple Cin. Cheerios",   struct:4, milk:5, dry:4, cartoon:2, tier:"a", weighted:4.00 },
  { name: "Cheerios",              struct:3, milk:1, dry:3, cartoon:1, tier:"a", weighted:2.10 },
  { name: "Special K Red",         struct:2, milk:2, dry:4, cartoon:1, tier:"a", weighted:2.25 },
  { name: "Lucky Charms",          struct:4, milk:3, dry:4, cartoon:5, tier:"a", weighted:3.85 },
  { name: "Life",                  struct:4, milk:4, dry:3, cartoon:2, tier:"a", weighted:3.50 },
  { name: "Cocoa Puffs",           struct:4, milk:2, dry:3, cartoon:4, tier:"b", weighted:3.20 },
  { name: "Cinnamon Toast Crunch", struct:3, milk:3, dry:5, cartoon:5, tier:"b", weighted:3.70 },
  { name: "Froot Loops",           struct:4, milk:2, dry:3, cartoon:5, tier:"b", weighted:3.35 },
  { name: "Reese's Puffs",         struct:5, milk:3, dry:4, cartoon:5, tier:"b", weighted:4.20 },
  { name: "Special K",             struct:2, milk:1, dry:3, cartoon:1, tier:"b", weighted:1.75 },
  { name: "Frosted Mini Wheats",   struct:2, milk:2, dry:3, cartoon:4, tier:"b", weighted:2.50 },
  { name: "Raisin Bran",           struct:2, milk:1, dry:3, cartoon:2, tier:"b", weighted:1.90 },
  { name: "Cap'n Crunch PB",       struct:4, milk:4, dry:4, cartoon:4, tier:"b", weighted:4.00 },
  { name: "Honey Bunches of Oats", struct:4, milk:4, dry:3, cartoon:1, tier:"b", weighted:3.35 },
  { name: "Chex Wheat",            struct:4, milk:2, dry:3, cartoon:1, tier:"b", weighted:2.75 },
  { name: "Chex Rice",             struct:2, milk:4, dry:3, cartoon:1, tier:"b", weighted:2.65 },
  { name: "Chex Corn",             struct:3, milk:3, dry:3, cartoon:1, tier:"b", weighted:2.70 },
  { name: "Apple Jacks",           struct:4, milk:1, dry:1, cartoon:5, tier:"c", weighted:2.65 },
  { name: "Cocoa Crispies",        struct:3, milk:3, dry:2, cartoon:4, tier:"c", weighted:2.95 },
  { name: "Corn Flakes",           struct:3, milk:2, dry:2, cartoon:1, tier:"c", weighted:2.20 },
  { name: "Cocoa Pebbles",         struct:1, milk:3, dry:2, cartoon:4, tier:"c", weighted:2.25 },
  { name: "Cap'n Crunch",          struct:3, milk:2, dry:3, cartoon:5, tier:"c", weighted:3.00 },
  { name: "Frosted Crispies",      struct:4, milk:3, dry:3, cartoon:4, tier:"c", weighted:3.50 },
  { name: "Grape Nuts",            struct:5, milk:1, dry:3, cartoon:1, tier:"c", weighted:2.80 },
  { name: "Trix",                  struct:3, milk:1, dry:2, cartoon:5, tier:"d", weighted:2.50 },
  { name: "Pops",                  struct:3, milk:1, dry:2, cartoon:2, tier:"d", weighted:2.05 },
  { name: "Fruity Pebbles",        struct:1, milk:1, dry:1, cartoon:5, tier:"d", weighted:1.60 },
  { name: "Cookie Crisp",          struct:4, milk:1, dry:1, cartoon:4, tier:"d", weighted:2.50 },
  { name: "Cap'n Crunch Berry",    struct:4, milk:1, dry:1, cartoon:4, tier:"d", weighted:2.50 },
];

// scene setup
const wrap = document.getElementById('canvas-wrap');
const W = wrap.clientWidth || 900, H = wrap.clientHeight || 560;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0xfffdf7, 1);
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
camera.position.set(6, 5, 8);
camera.lookAt(0, 0, 0);

// lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(5, 8, 5);
scene.add(dir);

// grid box / axes
const RANGE = 2.5;
function makeAxis(from, to, color) {
  const mat = new THREE.LineBasicMaterial({ color, opacity: 0.3, transparent: true });
  const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...from), new THREE.Vector3(...to)]);
  return new THREE.Line(geo, mat);
}

// axis lines
scene.add(makeAxis([-RANGE,0,0],[RANGE,0,0], 0xe63946));
scene.add(makeAxis([0,-RANGE,0],[0,RANGE,0], 0x2a9d8f));
scene.add(makeAxis([0,0,-RANGE],[0,0,RANGE], 0x457b9d));

// grid
const gridHelper = new THREE.GridHelper(5, 8, 0x1a1209, 0x1a1209);
gridHelper.material.opacity = 0.06;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// map 1-5 to -2..2
function mapVal(v) { return (v - 3) * 1.0; }

// spheres
const spheres = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

data.forEach((d, i) => {
  const jitter = () => (Math.random() - 0.5) * 0.18;
  const x = mapVal(d.struct) + jitter();
  const y = mapVal(d.milk) + jitter();
  const z = mapVal(d.dry) + jitter();
  const r = 0.07 + (d.cartoon - 1) * 0.04; // 0.07 to 0.23

  const geo = new THREE.SphereGeometry(r, 20, 20);
  const mat = new THREE.MeshPhongMaterial({
    color: TIER_COLORS[d.tier],
    shininess: 60,
    transparent: true,
    opacity: 0.88,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.userData = d;
  scene.add(mesh);
  spheres.push(mesh);
});

// axis labels as sprites
function makeTextSprite(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'transparent';
  ctx.clearRect(0,0,256,64);
  ctx.fillStyle = color;
  ctx.font = 'bold 22px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text.toUpperCase(), 128, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.2, 0.3, 1);
  return sprite;
}

const lx = makeTextSprite('struct. integrity →', '#e63946');
lx.position.set(RANGE + 0.2, -0.4, 0);
lx.scale.set(1.6, 0.28, 1);
scene.add(lx);

const ly = makeTextSprite('milk palatability →', '#2a9d8f');
ly.position.set(0, RANGE + 0.5, 0);
scene.add(ly);

const lz = makeTextSprite('dry merit →', '#457b9d');
lz.position.set(0, 0, RANGE + 0.7);
scene.add(lz);

// orbit controls (manual)
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.6, phi: 0.9, radius: 11 };

function updateCamera() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);
}
updateCamera();

wrap.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    spherical.theta -= dx * 0.008;
    spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi + dy * 0.008));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
    const tip = document.getElementById('tooltip');
    tip.style.opacity = '0';
    tip.dataset.current = '';
  }

  // hover
  const rect = wrap.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / W) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / H) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(spheres);
  const tip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const d = hits[0].object.userData;
    tip.style.opacity = '1';
    tip.style.left = (e.clientX - rect.left + 12) + 'px';
    tip.style.top = (e.clientY - rect.top - 10) + 'px';
    tip.innerHTML = `${d.name}<br><span style="opacity:0.6">${d.tier.toUpperCase()} tier · weighted ${d.weighted.toFixed(2)}<br>struct ${d.struct} · milk ${d.milk} · dry ${d.dry} · cartoon ${d.cartoon}</span>`;
  } else {
    tip.style.opacity = '0';
  }
});

// touch events
let touchStartPos = { x: 0, y: 0 };
let touchMoved = false;

wrap.addEventListener('touchstart', e => {
  isDragging = true;
  touchMoved = false;
  touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });

wrap.addEventListener('touchend', e => {
  isDragging = false;
  if (!touchMoved) {
    // treat as tap — show tooltip for nearest sphere
    const rect = wrap.getBoundingClientRect();
    const tx = e.changedTouches[0].clientX;
    const ty = e.changedTouches[0].clientY;
    mouse.x = ((tx - rect.left) / W) * 2 - 1;
    mouse.y = -((ty - rect.top) / H) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(spheres);
    if (hits.length > 0) {
      const d = hits[0].object.userData;
      const tip = document.getElementById('tooltip');
      // tap same sphere again to dismiss
      if (tip.dataset.current === d.name && tip.style.opacity === '1') {
        tip.style.opacity = '0';
        tip.dataset.current = '';
      } else {
        tip.style.opacity = '1';
        tip.style.left = (tx - rect.left + 12) + 'px';
        tip.style.top = (ty - rect.top - 10) + 'px';
        tip.innerHTML = `${d.name}<br><span style="opacity:0.6">${d.tier.toUpperCase()} tier · weighted ${d.weighted.toFixed(2)}<br>struct ${d.struct} · milk ${d.milk} · dry ${d.dry} · cartoon ${d.cartoon}</span>`;
        tip.dataset.current = d.name;
      }
    } else {
      const tip = document.getElementById('tooltip');
      tip.style.opacity = '0';
      tip.dataset.current = '';
    }
  }
});

wrap.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  const distFromStart = Math.hypot(e.touches[0].clientX - touchStartPos.x, e.touches[0].clientY - touchStartPos.y);
  if (distFromStart > 6) {
    touchMoved = true;
    // hide tooltip when rotating
    const tip = document.getElementById('tooltip');
    tip.style.opacity = '0';
    tip.dataset.current = '';
  }
  spherical.theta -= dx * 0.008;
  spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi + dy * 0.008));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  updateCamera();
  e.preventDefault();
}, { passive: false });

wrap.addEventListener('wheel', e => {
  spherical.radius = Math.max(4, Math.min(18, spherical.radius + e.deltaY * 0.01));
  updateCamera();
  e.preventDefault();
}, { passive: false });

// render loop
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// search
const TIER_HEX = { s: '#e63946', a: '#f4a261', b: '#2a9d8f', c: '#457b9d', d: '#6d6875' };

function dots(val, color) {
  return [1,2,3,4,5].map(i =>
    `<div class="dot${i <= val ? ' filled' : ''}" style="${i <= val ? `background:${color}` : ''}"></div>`
  ).join('');
}

function renderResult(d) {
  const color = TIER_HEX[d.tier];
  return `
    <div class="result-card">
      <div style="display:flex;align-items:center;gap:10px;width:100%">
        <div class="result-name">${d.name}</div>
        <div class="result-tier" style="background:${color}">${d.tier.toUpperCase()}</div>
        <div class="result-weighted" style="margin-left:auto">
          <div class="result-weighted-label">weighted score</div>
          <div class="result-weighted-val" style="color:${color}">${d.weighted.toFixed(2)}</div>
        </div>
      </div>
      <div class="result-axes">
        <div class="result-axis">
          <div class="result-axis-label">structural integrity</div>
          <div class="result-axis-val">${d.struct} / 5</div>
          <div class="result-axis-dots">${dots(d.struct, color)}</div>
        </div>
        <div class="result-axis">
          <div class="result-axis-label">milk palatability</div>
          <div class="result-axis-val">${d.milk} / 5</div>
          <div class="result-axis-dots">${dots(d.milk, color)}</div>
        </div>
        <div class="result-axis">
          <div class="result-axis-label">dry merit</div>
          <div class="result-axis-val">${d.dry} / 5</div>
          <div class="result-axis-dots">${dots(d.dry, color)}</div>
        </div>
        <div class="result-axis">
          <div class="result-axis-label">cartoon effect</div>
          <div class="result-axis-val">${d.cartoon} / 5</div>
          <div class="result-axis-dots">${dots(d.cartoon, color)}</div>
        </div>
      </div>
    </div>`;
}

// tier filter
let activeTiers = new Set(['s','a','b','c','d']);

function applyFilter() {
  spheres.forEach(s => {
    const tier = s.userData.tier;
    const visible = activeTiers.has(tier);
    s.visible = visible;
    s.material.opacity = visible ? 0.88 : 0;
  });
}

document.querySelectorAll('.legend-item[data-tier]').forEach(btn => {
  btn.addEventListener('click', () => {
    const tier = btn.dataset.tier;
    if (activeTiers.size === 5) {
      // first click: isolate this tier
      activeTiers = new Set([tier]);
    } else if (activeTiers.has(tier) && activeTiers.size === 1) {
      // clicking the only active tier: reset all
      activeTiers = new Set(['s','a','b','c','d']);
    } else if (activeTiers.has(tier)) {
      activeTiers.delete(tier);
    } else {
      activeTiers.add(tier);
    }
    document.querySelectorAll('.legend-item[data-tier]').forEach(b => {
      const t = b.dataset.tier;
      b.classList.toggle('active', activeTiers.has(t) && activeTiers.size < 5);
      b.classList.toggle('dimmed', !activeTiers.has(t));
    });
    const tip = document.getElementById('tooltip');
    tip.style.opacity = '0';
    tip.dataset.current = '';
    applyFilter();
  });
});

document.getElementById('reset-filter').addEventListener('click', () => {
  activeTiers = new Set(['s','a','b','c','d']);
  document.querySelectorAll('.legend-item[data-tier]').forEach(b => {
    b.classList.remove('active', 'dimmed');
  });
  applyFilter();
});

document.getElementById('cereal-search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const resultDiv = document.getElementById('search-result');
  if (!q) { resultDiv.innerHTML = ''; return; }

  const matches = data.filter(d => d.name.toLowerCase().includes(q));

  if (matches.length === 0) {
    resultDiv.innerHTML = '<div class="no-result">no cereal found</div>';
  } else if (matches.length === 1) {
    resultDiv.innerHTML = renderResult(matches[0]);
    // highlight sphere
    spheres.forEach(s => {
      s.material.emissive = new THREE.Color(s.userData.name === matches[0].name ? 0xffffff : 0x000000);
      s.material.emissiveIntensity = s.userData.name === matches[0].name ? 0.4 : 0;
    });
  } else {
    resultDiv.innerHTML = matches.map(renderResult).join('<div style="height:6px"></div>');
    spheres.forEach(s => { s.material.emissive = new THREE.Color(0x000000); s.material.emissiveIntensity = 0; });
  }
});
</script>
</body>
</html>
